<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" role="img" font-family="ui-monospace, 'Cascadia Code', monospace" font-size="11">
  <title>PayGateway Database ERD</title>
  <desc>Entity Relationship Diagram showing all 7 tables and their foreign key relationships</desc>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6b7280"/>
    </marker>
  </defs>

  <rect width="900" height="620" fill="#ffffff"/>

  <!-- ── payments (center) ─────────────────────────────────── -->
  <g id="payments">
    <rect x="310" y="30" width="210" height="270" rx="6" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <rect x="310" y="30" width="210" height="26" rx="6" fill="#3b82f6"/>
    <rect x="310" y="44"  width="210" height="12" fill="#3b82f6"/>
    <text x="415" y="47" text-anchor="middle" fill="#ffffff" font-weight="700" font-size="12">payments</text>
    <text x="322" y="72"  fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="460" y="72"  fill="#6b7280">UUID PK</text>
    <text x="322" y="89"  fill="#111827">external_id</text>                         <text x="460" y="89"  fill="#6b7280">VARCHAR</text>
    <text x="322" y="106" fill="#111827">provider</text>                             <text x="460" y="106" fill="#6b7280">VARCHAR</text>
    <text x="322" y="123" fill="#111827">status</text>                               <text x="460" y="123" fill="#6b7280">VARCHAR</text>
    <text x="322" y="140" fill="#111827">amount</text>                               <text x="460" y="140" fill="#6b7280">BIGINT</text>
    <text x="322" y="157" fill="#111827">currency</text>                             <text x="460" y="157" fill="#6b7280">VARCHAR(3)</text>
    <text x="322" y="174" fill="#111827">customer_id</text>                          <text x="460" y="174" fill="#6b7280">VARCHAR</text>
    <text x="322" y="191" fill="#111827">metadata</text>                             <text x="460" y="191" fill="#6b7280">JSONB</text>
    <text x="322" y="208" fill="#111827">idempotency_key</text>                      <text x="460" y="208" fill="#6b7280">VARCHAR UQ</text>
    <text x="322" y="225" fill="#111827">client_secret</text>                        <text x="460" y="225" fill="#6b7280">VARCHAR</text>
    <text x="322" y="242" fill="#111827">failure_code</text>                         <text x="460" y="242" fill="#6b7280">VARCHAR</text>
    <text x="322" y="259" fill="#111827">confirmed_at</text>                         <text x="460" y="259" fill="#6b7280">TIMESTAMPTZ</text>
    <text x="322" y="276" fill="#111827">canceled_at</text>                          <text x="460" y="276" fill="#6b7280">TIMESTAMPTZ</text>
    <line x1="310" y1="78"  x2="520" y2="78"  stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="452" y1="56"  x2="452" y2="300" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── refunds ───────────────────────────────────────────── -->
  <g id="refunds">
    <rect x="590" y="30" width="200" height="220" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="590" y="30" width="200" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="590" y="44" width="200" height="12" fill="#f3f4f6"/>
    <text x="690" y="47" text-anchor="middle" fill="#111827" font-weight="700" font-size="12">refunds</text>
    <text x="602" y="72"  fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="738" y="72"  fill="#6b7280">UUID PK</text>
    <text x="602" y="89"  fill="#dc2626" font-weight="600">⬡ payment_id</text>     <text x="738" y="89"  fill="#6b7280">UUID FK</text>
    <text x="602" y="106" fill="#111827">external_id</text>                         <text x="738" y="106" fill="#6b7280">VARCHAR</text>
    <text x="602" y="123" fill="#111827">amount</text>                              <text x="738" y="123" fill="#6b7280">BIGINT</text>
    <text x="602" y="140" fill="#111827">reason</text>                              <text x="738" y="140" fill="#6b7280">VARCHAR</text>
    <text x="602" y="157" fill="#111827">status</text>                              <text x="738" y="157" fill="#6b7280">VARCHAR</text>
    <text x="602" y="174" fill="#111827">idempotency_key</text>                     <text x="738" y="174" fill="#6b7280">VARCHAR UQ</text>
    <text x="602" y="191" fill="#111827">failure_reason</text>                      <text x="738" y="191" fill="#6b7280">TEXT</text>
    <text x="602" y="208" fill="#111827">created_at / updated_at</text>
    <line x1="590" y1="78"  x2="790" y2="78"  stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="732" y1="56"  x2="732" y2="250" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── audit_log ─────────────────────────────────────────── -->
  <g id="audit_log">
    <rect x="310" y="360" width="210" height="200" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="310" y="360" width="210" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="310" y="374" width="210" height="12" fill="#f3f4f6"/>
    <text x="415" y="377" text-anchor="middle" fill="#111827" font-weight="700" font-size="12">audit_log</text>
    <text x="322" y="402" fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="460" y="402" fill="#6b7280">UUID PK</text>
    <text x="322" y="419" fill="#111827">actor_id</text>                            <text x="460" y="419" fill="#6b7280">VARCHAR</text>
    <text x="322" y="436" fill="#111827">actor_type</text>                          <text x="460" y="436" fill="#6b7280">VARCHAR</text>
    <text x="322" y="453" fill="#111827">action</text>                              <text x="460" y="453" fill="#6b7280">VARCHAR</text>
    <text x="322" y="470" fill="#111827">resource_type</text>                       <text x="460" y="470" fill="#6b7280">VARCHAR</text>
    <text x="322" y="487" fill="#111827">resource_id</text>                         <text x="460" y="487" fill="#6b7280">UUID</text>
    <text x="322" y="504" fill="#111827">ip_address</text>                          <text x="460" y="504" fill="#6b7280">VARCHAR</text>
    <text x="322" y="521" fill="#111827">outcome</text>                             <text x="460" y="521" fill="#6b7280">VARCHAR</text>
    <text x="322" y="538" fill="#111827">timestamp</text>                           <text x="460" y="538" fill="#6b7280">TIMESTAMPTZ</text>
    <line x1="310" y1="408" x2="520" y2="408" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="452" y1="386" x2="452" y2="560" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── api_keys ──────────────────────────────────────────── -->
  <g id="api_keys">
    <rect x="60" y="30" width="200" height="210" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="60" y="30" width="200" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="60" y="44" width="200" height="12" fill="#f3f4f6"/>
    <text x="160" y="47" text-anchor="middle" fill="#111827" font-weight="700" font-size="12">api_keys</text>
    <text x="72"  y="72"  fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="200" y="72"  fill="#6b7280">UUID PK</text>
    <text x="72"  y="89"  fill="#111827">name</text>                               <text x="200" y="89"  fill="#6b7280">VARCHAR</text>
    <text x="72"  y="106" fill="#111827">key_hash</text>                           <text x="200" y="106" fill="#6b7280">VARCHAR UQ</text>
    <text x="72"  y="123" fill="#111827">key_prefix</text>                         <text x="200" y="123" fill="#6b7280">VARCHAR(8)</text>
    <text x="72"  y="140" fill="#111827">role</text>                               <text x="200" y="140" fill="#6b7280">VARCHAR</text>
    <text x="72"  y="157" fill="#111827">is_active</text>                          <text x="200" y="157" fill="#6b7280">BOOLEAN</text>
    <text x="72"  y="174" fill="#111827">last_used_at</text>                       <text x="200" y="174" fill="#6b7280">TIMESTAMPTZ</text>
    <text x="72"  y="191" fill="#111827">expires_at</text>                         <text x="200" y="191" fill="#6b7280">TIMESTAMPTZ</text>
    <text x="72"  y="208" fill="#111827">created_at / updated_at</text>
    <line x1="60"  y1="78"  x2="260" y2="78"  stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="192" y1="56"  x2="192" y2="240" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── idempotency_records ───────────────────────────────── -->
  <g id="idempotency_records">
    <rect x="60" y="370" width="200" height="155" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="60" y="370" width="200" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="60" y="384" width="200" height="12" fill="#f3f4f6"/>
    <text x="160" y="387" text-anchor="middle" fill="#111827" font-weight="700" font-size="11">idempotency_records</text>
    <text x="72"  y="412" fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="200" y="412" fill="#6b7280">UUID PK</text>
    <text x="72"  y="429" fill="#111827">idempotency_key</text>                    <text x="200" y="429" fill="#6b7280">VARCHAR UQ</text>
    <text x="72"  y="446" fill="#111827">response_status</text>                    <text x="200" y="446" fill="#6b7280">INTEGER</text>
    <text x="72"  y="463" fill="#111827">response_body</text>                      <text x="200" y="463" fill="#6b7280">JSON</text>
    <text x="72"  y="480" fill="#111827">expires_at</text>                         <text x="200" y="480" fill="#6b7280">TIMESTAMPTZ</text>
    <text x="72"  y="497" fill="#111827">created_at</text>                         <text x="200" y="497" fill="#6b7280">TIMESTAMPTZ</text>
    <line x1="60"  y1="418" x2="260" y2="418" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="192" y1="396" x2="192" y2="525" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── webhook_events ───────────────────────────────────── -->
  <g id="webhook_events">
    <rect x="590" y="290" width="200" height="165" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="590" y="290" width="200" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="590" y="304" width="200" height="12" fill="#f3f4f6"/>
    <text x="690" y="307" text-anchor="middle" fill="#111827" font-weight="700" font-size="12">webhook_events</text>
    <text x="602" y="332" fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="738" y="332" fill="#6b7280">UUID PK</text>
    <text x="602" y="349" fill="#111827">event_id</text>                            <text x="738" y="349" fill="#6b7280">VARCHAR UQ</text>
    <text x="602" y="366" fill="#111827">event_type</text>                          <text x="738" y="366" fill="#6b7280">VARCHAR</text>
    <text x="602" y="383" fill="#111827">payload</text>                             <text x="738" y="383" fill="#6b7280">JSON</text>
    <text x="602" y="400" fill="#111827">processed_at</text>                        <text x="738" y="400" fill="#6b7280">TIMESTAMPTZ</text>
    <text x="602" y="417" fill="#111827">created_at</text>                          <text x="738" y="417" fill="#6b7280">TIMESTAMPTZ</text>
    <line x1="590" y1="338" x2="790" y2="338" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="732" y1="316" x2="732" y2="455" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── reconciliation_reports ───────────────────────────── -->
  <g id="reconciliation_reports">
    <rect x="590" y="480" width="200" height="130" rx="6" fill="#ffffff" stroke="#d1d5db" stroke-width="1.5"/>
    <rect x="590" y="480" width="200" height="26" rx="6" fill="#f3f4f6"/>
    <rect x="590" y="494" width="200" height="12" fill="#f3f4f6"/>
    <text x="690" y="497" text-anchor="middle" fill="#111827" font-weight="700" font-size="10.5">reconciliation_reports</text>
    <text x="602" y="522" fill="#3b82f6" font-weight="700">🔑 id</text>            <text x="738" y="522" fill="#6b7280">UUID PK</text>
    <text x="602" y="539" fill="#111827">status</text>                              <text x="738" y="539" fill="#6b7280">VARCHAR</text>
    <text x="602" y="556" fill="#111827">date_range_start/end</text>
    <text x="602" y="573" fill="#111827">total_checked</text>                       <text x="738" y="573" fill="#6b7280">INTEGER</text>
    <text x="602" y="590" fill="#111827">mismatches / actor_id</text>
    <line x1="590" y1="528" x2="790" y2="528" stroke="#e5e7eb" stroke-width="0.5"/>
    <line x1="732" y1="506" x2="732" y2="610" stroke="#e5e7eb" stroke-width="0.5"/>
  </g>

  <!-- ── Relationships ─────────────────────────────────────── -->
  <!-- payments (id) → refunds (payment_id): FK 1:N -->
  <line x1="520" y1="89" x2="588" y2="89" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="533" y="82" fill="#dc2626" font-size="10" font-weight="600">1:N</text>

  <!-- payments → audit_log: logical -->
  <line x1="415" y1="300" x2="415" y2="358" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="420" y="332" fill="#6b7280" font-size="10">logs</text>

  <!-- api_keys → audit_log: logical (actor) -->
  <line x1="160" y1="240" x2="160" y2="345" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="160" y1="345" x2="312" y2="419" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="168" y="368" fill="#6b7280" font-size="10">actor</text>

  <!-- payments → webhook_events: logical -->
  <line x1="520" y1="200" x2="588" y2="340" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)" stroke-dasharray="4,3"/>
  <text x="543" y="268" fill="#6b7280" font-size="10">syncs</text>

  <!-- Legend -->
  <rect x="60" y="555" width="232" height="52" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="72" y="572" fill="#111827" font-size="10" font-weight="700">Legend</text>
  <line x1="72" y1="583" x2="100" y2="583" stroke="#dc2626" stroke-width="1.5"/>
  <text x="104" y="587" fill="#6b7280" font-size="10">FK relationship (1:N)</text>
  <line x1="72" y1="599" x2="100" y2="599" stroke="#6b7280" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="104" y="603" fill="#6b7280" font-size="10">Logical reference (no FK)</text>
</svg>
